<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام متابعة زياد وفريدة - المطور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
        .missing-days-list { max-height: 250px; overflow-y: auto; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <div id="loginSection" class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg mt-20">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-800">تسجيل دخول الأدمن</h2>
        <input type="text" id="phone" placeholder="رقم الهاتف" class="w-full p-3 mb-4 border rounded-lg text-center focus:outline-none focus:ring-2 focus:ring-blue-500">
        <input type="password" id="pass" placeholder="كلمة المرور" class="w-full p-3 mb-6 border rounded-lg text-center focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">دخول</button>
    </div>

    <div id="appSection" class="hidden max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-2 space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-lg">
                <h1 class="text-2xl font-bold text-center mb-6 text-gray-800 border-b pb-4">لوحة تحكم (زياد & فريدة)</h1>
                
                <div class="grid grid-cols-2 gap-4 mb-8 text-center">
                    <div class="bg-blue-50 p-5 rounded-xl border border-blue-200">
                        <h3 class="text-lg font-bold text-blue-800">زياد</h3>
                        <p id="ziadPoints" class="text-4xl font-black text-blue-600 my-2">0</p>
                    </div>
                    <div class="bg-pink-50 p-5 rounded-xl border border-pink-200">
                        <h3 class="text-lg font-bold text-pink-800">فريدة</h3>
                        <p id="faridaPoints" class="text-4xl font-black text-pink-600 my-2">0</p>
                    </div>
                </div>

                <div class="bg-gray-50 p-4 rounded-xl border">
                    <h4 class="font-bold mb-4 text-gray-700 underline">إضافة يوم جديد:</h4>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm mb-1 text-gray-500">اختر التاريخ:</label>
                            <input type="date" id="targetDate" onchange="checkIfDateExists()" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500">
                            <p class="text-xs text-gray-400 mt-1">النطاق المسموح: من 17 أبريل 2026 حتى 90 يوم بعدها.</p>
                        </div>
                        
                        <div class="flex justify-between items-center p-3 bg-white rounded-lg border">
                            <span class="font-bold text-blue-700">زياد:</span>
                            <div class="flex gap-2">
                                <button onclick="setStatus('ziad', 'Yes')" id="btn-z-yes" class="px-5 py-2 bg-gray-200 rounded-lg font-bold transition">نعم</button>
                                <button onclick="setStatus('ziad', 'No')" id="btn-z-no" class="px-5 py-2 bg-gray-200 rounded-lg font-bold transition">لا</button>
                            </div>
                        </div>

                        <div class="flex justify-between items-center p-3 bg-white rounded-lg border">
                            <span class="font-bold text-pink-700">فريدة:</span>
                            <div class="flex gap-2">
                                <button onclick="setStatus('farida', 'Yes')" id="btn-f-yes" class="px-5 py-2 bg-gray-200 rounded-lg font-bold transition">نعم</button>
                                <button onclick="setStatus('farida', 'No')" id="btn-f-no" class="px-5 py-2 bg-gray-200 rounded-lg font-bold transition">لا</button>
                            </div>
                        </div>

                        <button onclick="saveData()" id="saveBtn" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold text-lg hover:bg-green-700 transition disabled:bg-gray-400 disabled:cursor-not-allowed">
                            حفظ البيانات
                        </button>
                        <p id="statusMsg" class="text-center text-sm font-bold mt-2"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-lg h-fit">
            <h3 class="font-bold text-gray-800 mb-4 border-b pb-2 text-center">أيام لم يتم تسجيلها</h3>
            <div id="missingDays" class="missing-days-list space-y-2 text-sm">
                <p class="text-gray-400 text-center">جاري التحقق...</p>
            </div>
            <button onclick="logout()" class="w-full mt-6 text-xs text-red-500 hover:underline">تسجيل خروج من الحساب</button>
        </div>

    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxHFhklm_PPwQQgewsXyZ5U3Y72Utf5bRbb445UQNXCTZQ2wgSJH1Y9qcovBIBdOw55/exec";
        
        let ziadStatus = "";
        let faridaStatus = "";
        let existingDates = [];

        const START_DATE_STR = "2026-04-17";
        const TOTAL_DAYS_LIMIT = 90;

        function getLocalDateFormat(dateInput) {
            let d = new Date(dateInput);
            if (isNaN(d)) return "";
            let year = d.getFullYear();
            let month = String(d.getMonth() + 1).padStart(2, '0');
            let day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        window.onload = function() {
            if(localStorage.getItem('isLoggedIn') === 'true') {
                showApp();
            }

            const startDate = new Date(START_DATE_STR);
            const maxDate = new Date(startDate);
            maxDate.setDate(maxDate.getDate() + TOTAL_DAYS_LIMIT);

            const today = new Date();
            const dateInput = document.getElementById('targetDate');
            
            let defaultDate = today <= maxDate ? today : maxDate;
            if(today < startDate) defaultDate = startDate;

            dateInput.value = getLocalDateFormat(defaultDate);
            dateInput.min = START_DATE_STR;
            dateInput.max = getLocalDateFormat(maxDate);
        };

        function login() {
            const phone = document.getElementById('phone').value;
            const pass = document.getElementById('pass').value;
            if(phone === "01154931351" && pass === "12345678") {
                localStorage.setItem('isLoggedIn', 'true');
                showApp();
            } else {
                alert("بيانات الدخول خطأ!");
            }
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            location.reload();
        }

        function showApp() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            fetchData();
        }

        function setStatus(person, status) {
            if(person === 'ziad') {
                ziadStatus = status;
                document.getElementById('btn-z-yes').className = status === 'Yes' ? 'px-5 py-2 bg-green-500 text-white rounded-lg font-bold transition' : 'px-5 py-2 bg-gray-200 rounded-lg font-bold transition';
                document.getElementById('btn-z-no').className = status === 'No' ? 'px-5 py-2 bg-red-500 text-white rounded-lg font-bold transition' : 'px-5 py-2 bg-gray-200 rounded-lg font-bold transition';
            } else {
                faridaStatus = status;
                document.getElementById('btn-f-yes').className = status === 'Yes' ? 'px-5 py-2 bg-green-500 text-white rounded-lg font-bold transition' : 'px-5 py-2 bg-gray-200 rounded-lg font-bold transition';
                document.getElementById('btn-f-no').className = status === 'No' ? 'px-5 py-2 bg-red-500 text-white rounded-lg font-bold transition' : 'px-5 py-2 bg-gray-200 rounded-lg font-bold transition';
            }
        }

        async function fetchData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                existingDates = data.slice(1).map(row => {
                    return getLocalDateFormat(row[0]);
                });

                calculatePoints(data);
                checkIfDateExists();
                updateMissingDays();
            } catch (e) { 
                console.log("Error fetching data"); 
                document.getElementById('missingDays').innerHTML = "<p class='text-red-500 text-center'>خطأ في جلب البيانات</p>";
            }
        }

        function checkIfDateExists() {
            const selectedDate = document.getElementById('targetDate').value;
            const saveBtn = document.getElementById('saveBtn');
            const msg = document.getElementById('statusMsg');

            if(existingDates.includes(selectedDate)) {
                saveBtn.disabled = true;
                msg.innerText = "⚠️ هذا اليوم مسجل بالفعل في قاعدة البيانات";
                msg.className = "text-center text-sm font-bold text-orange-600 mt-2";
            } else {
                saveBtn.disabled = false;
                msg.innerText = "";
            }
        }

        function updateMissingDays() {
            const listDiv = document.getElementById('missingDays');
            listDiv.innerHTML = "";
            
            let startDate = new Date(START_DATE_STR);
            let today = new Date();
            
            let maxDate = new Date(startDate);
            maxDate.setDate(maxDate.getDate() + TOTAL_DAYS_LIMIT);

            let loopEndDate = today < maxDate ? today : maxDate;
            let missing = [];

            for (let d = new Date(startDate); d <= loopEndDate; d.setDate(d.getDate() + 1)) {
                let dateStr = getLocalDateFormat(d);
                if (!existingDates.includes(dateStr)) {
                    missing.push(dateStr);
                }
            }

            if(missing.length === 0) {
                listDiv.innerHTML = "<p class='text-green-600 text-center font-bold bg-green-50 p-2 rounded'>كل الأيام مسجلة حتى اليوم! ✅</p>";
            } else {
                missing.reverse().forEach(date => {
                    let formattedDate = new Date(date).toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' });
                    listDiv.innerHTML += `<div class="p-2 bg-red-50 text-red-700 rounded border border-red-100 text-center font-bold shadow-sm mb-2">${formattedDate}<br><span class="text-xs text-gray-500">${date}</span></div>`;
                });
            }
        }

        function calculatePoints(data) {
            let zPoints = 0, fPoints = 0;
            
            for(let i = 1; i < data.length; i++) {
                // حساب نقاط زياد مع منع النزول تحت الصفر
                if(data[i][1] === "Yes") {
                    zPoints += 5;
                } else if(data[i][1] === "No") {
                    zPoints -= 5;
                    if(zPoints < 0) zPoints = 0; // حماية ضد الرصيد السالب
                }
                
                // حساب نقاط فريدة مع منع النزول تحت الصفر
                if(data[i][2] === "Yes") {
                    fPoints += 5;
                } else if(data[i][2] === "No") {
                    fPoints -= 5;
                    if(fPoints < 0) fPoints = 0; // حماية ضد الرصيد السالب
                }
            }
            
            document.getElementById('ziadPoints').innerText = zPoints;
            document.getElementById('faridaPoints').innerText = fPoints;
        }

        async function saveData() {
            const date = document.getElementById('targetDate').value;
            const msg = document.getElementById('statusMsg');
            
            if(!date || !ziadStatus || !faridaStatus) {
                alert("من فضلك اختر الحالة للاثنين أولاً");
                return;
            }

            document.getElementById('saveBtn').innerText = "جاري الحفظ...";
            document.getElementById('saveBtn').disabled = true;

            const payload = { date: date, ziad: ziadStatus, farida: faridaStatus };

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });

                msg.innerText = "تم الحفظ بنجاح! جاري التحديث...";
                msg.className = "text-center text-sm font-bold text-green-600 mt-2";
                
                setTimeout(() => {
                    ziadStatus = "";
                    faridaStatus = "";
                    document.querySelectorAll('button[id^="btn-"]').forEach(btn => {
                        btn.className = 'px-5 py-2 bg-gray-200 rounded-lg font-bold transition';
                    });
                    
                    document.getElementById('saveBtn').innerText = "حفظ البيانات";
                    fetchData(); 
                }, 1500);

            } catch (error) {
                alert("حدث خطأ في الاتصال");
                document.getElementById('saveBtn').disabled = false;
                document.getElementById('saveBtn').innerText = "حفظ البيانات";
            }
        }
    </script>
</body>
</html>
